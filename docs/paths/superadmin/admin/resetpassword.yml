put:
  tags:
    - Super Admin - Admin Management
  summary: Reset password admin by id endpoint
  description: description . . .
  parameters:
    - name : adminId
      in: path
      required: true
      schema:
        type: string
        example: cmd61m4hq0000tav0q17flh1k
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - newPassword
          properties:
            newPassword:
              type: string
              example: updateSecurePassword123
  responses:
    "200":
      description: Successful operation
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  admin:
                    type: object
                    $ref: "../../../components/schemas/Admin.yml#/Admin"
              message:
                type: string
              success:
                type: boolean

    "404":
      $ref: "../../../components/responses/NotFound.yml"    
    "422":
      $ref: "../../../components/responses/ValidationError.yml"