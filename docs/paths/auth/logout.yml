post:
  tags:
    - Public
  summary: Logout endpoint
  description: Clear authentication cookie and logout the user.
  responses:
    "200":
      description: Logout successful
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: string
                example: null
              message:
                type: string
                example: Success logout
              success:
                type: boolean
                example: true
    "401":
      $ref: "../../components/responses/Unauthorized.yml"
    "500":
      $ref: "../../components/responses/InternalServerError.yml"
